name: Synchronize E1 canonical status

on:
  push:
    branches: [docs/hc-017-e1-status]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/hc-017-e1-status
          fetch-depth: 0
      - name: Patch canonical documents and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          current = Path('docs/CURRENT-STATE.md')
          text = current.read_text(encoding='utf-8')
          text = text.replace(
              'Repository application baseline: `34425d89fb205a43d8ce543862b2ab8371dabbb4`  \nRepository Alembic head: `0055`',
              'Repository application baseline: `2ad0ca47d994472201c218b3e6af37145cbacdec`  \nRepository Alembic head: `0057`',
              1,
          )
          text = text.replace(
              'Текущий verdict: `SLICE E ARCHITECTURE DEFINED / NOT IMPLEMENTED / NOT DEPLOYED`',
              'Текущий verdict: `SLICE E1 MERGED / CI VERIFIED / NOT DEPLOYED; E2 NOT IMPLEMENTED`',
              1,
          )
          text = text.replace(
              'repository: 34425d89... / Alembic 0055',
              'repository: 2ad0ca47... / Alembic 0057',
              1,
          )
          text = text.replace(
              'Migrations `0050–0055`, encrypted document storage, scanner, renderer, reconciler and OCR workers, quotas, safe rendering, OCR candidates and human-review flows have not been deployed. Slice E is documentation only and adds no migration or code. No HC-017 VPS rollout task has been issued.',
              'Migrations `0050–0057`, encrypted document storage, scanner, renderer, reconciler and OCR workers, quotas, safe rendering, OCR review and source-preserving Lab drafts have not been deployed. E1 exists only in the repository; confirmed Lab observations do not exist. No HC-017 VPS rollout task has been issued.',
              1,
          )
          start = text.index('## HC-017 Slice E — Confirmed Labs Core')
          end = text.index('## Remaining production blockers')
          replacement = '''## HC-017 Slice E — Confirmed Labs Core

Status: `E1 IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED; E2 NOT IMPLEMENTED`.

Canonical contract:

```text
docs/implementation/HC-017-SLICE-E-CONFIRMED-LABS-CORE.md
```

Architecture review:

```text
docs/reviews/HC-017-SLICE-E-ARCHITECTURE-REVIEW-2026-07-12.md
```

### E1 — Source-preserving Lab drafts

Status: `IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED`.

```text
PR: #61
verified head: 419386e909207ab67921c008e210c059aba6658c
merge: 2ad0ca47d994472201c218b3e6af37145cbacdec
CI: #477
migrations: 0056–0057
```

Implemented:

- owner/edit-only Lab drafts and exact OCR-candidate source manifests;
- FORCE RLS and no direct app mutation grants;
- explicit numeric/text/qualitative value kinds;
- preservation of source analyte, value, unit, range, date, specimen, flag and comments;
- explicit unknown/not-present decisions;
- current document, finalized OCR review and patient-decision timestamps on every mutation;
- active consent rechecked on create, update, source replacement and status transitions;
- optimistic concurrency and content-free audit;
- minimal Lab draft API and UI;
- no confirmed observations, normalization, interpretation or metric dynamics.

Canonical evidence:

```text
docs/implementation/HC-017-SLICE-E1-LAB-DRAFTS-EVIDENCE-2026-07-12.md
```

### E2 — Explicit confirmation

Status: `NEXT ARCHITECTURAL/IMPLEMENTATION GATE / NOT IMPLEMENTED / NOT DEPLOYED`.

E2 must add a separate atomic confirmation transaction and immutable confirmed observations. E1 `ready` drafts remain non-clinical and are not visible to `view` or `analyze`.

## Next allowed work

```text
HC-017 Slice E2 — Confirmed observations implementation contract and security review
```

Before E2 code:

1. review exact E1 diff and migrations `0056–0057` independently;
2. freeze immutable observation/source snapshot fields;
3. define explicit confirmation acknowledgements, including `not_present` patient assignment;
4. define idempotency and duplicate-submission behavior;
5. define owner/edit confirmation and confirmed-only read matrix;
6. define correction/void/erasure lifecycle without in-place value mutation;
7. keep workers unable to confirm observations;
8. prove E2 cannot consume stale draft/document/OCR/patient/source versions;
9. keep production upload disabled and issue no VPS task.

'''
          current.write_text(text[:start] + replacement + text[end:], encoding='utf-8')

          plan = Path('docs/PROJECT-PLAN.md')
          text = plan.read_text(encoding='utf-8')
          text = text.replace('Версия: 2.4', 'Версия: 2.5', 1)
          text = text.replace(
              '34425d89fb205a43d8ce543862b2ab8371dabbb4\nAlembic head: 0055',
              '2ad0ca47d994472201c218b3e6af37145cbacdec\nAlembic head: 0057',
              1,
          )
          text = text.replace(
              'SLICE D D1+D2 MERGED / CI VERIFIED / NOT DEPLOYED\nSLICE E ARCHITECTURE DEFINED / REVIEWED\nSLICE E NOT IMPLEMENTED',
              'SLICE D D1+D2 MERGED / CI VERIFIED / NOT DEPLOYED\nSLICE E1 MERGED / CI VERIFIED / NOT DEPLOYED\nSLICE E2 NOT IMPLEMENTED',
              1,
          )
          text = text.replace(
              'Status: `ARCHITECTURE DEFINED / REVIEWED / NOT IMPLEMENTED / NOT DEPLOYED`.',
              'Status: `E1 IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED; E2 NOT IMPLEMENTED`.',
              1,
          )
          text = text.replace(
              'ARCHITECTURE ACCEPTED FOR FUTURE IMPLEMENTATION\nNO SLICE E CODE YET\nNOT APPROVED FOR PRODUCTION DEPLOYMENT',
              'ARCHITECTURE ACCEPTED\nE1 IMPLEMENTED AND CI VERIFIED\nE2 NOT IMPLEMENTED\nNOT APPROVED FOR PRODUCTION DEPLOYMENT',
              1,
          )
          old = '''#### E1 — Structured Lab Drafts

Status: `NEXT / NOT IMPLEMENTED / NOT DEPLOYED`.

Planned scope:

- draft and draft-source tables;
- FORCE RLS and owner/edit-only access;
- current finalized D2/patient-decision gate;
- explicit value kind and unknown/not-present choices;
- source-preserving fields and optional parsed representations;
- exact candidate/source-role manifest;
- optimistic concurrency;
- draft API and source-fragment selection UI;
- zero confirmed observation rows.
'''
          new = '''#### E1 — Source-preserving Lab Drafts

Status: `IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED` through PR `#61`.

```text
verified head: 419386e909207ab67921c008e210c059aba6658c
merge: 2ad0ca47d994472201c218b3e6af37145cbacdec
CI: #477
migrations: 0056–0057
```

Implemented:

- draft and exact source-role tables with FORCE RLS;
- owner/edit-only access and no direct runtime mutation grants;
- source-preserving fields and explicit value/absence choices;
- current finalized D2, patient decision, document and consent gates on every mutation;
- optimistic concurrency and content-free audit;
- API and minimal source-fragment selection UI;
- zero confirmed observation rows.

Canonical evidence:

```text
docs/implementation/HC-017-SLICE-E1-LAB-DRAFTS-EVIDENCE-2026-07-12.md
```
'''
          if old not in text:
              raise SystemExit('E1 plan marker not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              'Status: `PLANNED AFTER E1 REVIEW`.',
              'Status: `NEXT / NOT IMPLEMENTED / NOT DEPLOYED`.',
              1,
          )
          plan.write_text(text, encoding='utf-8')

          contract = Path('docs/implementation/HC-017-SLICE-E-CONFIRMED-LABS-CORE.md')
          text = contract.read_text(encoding='utf-8')
          text = text.replace(
              'Status: `ARCHITECTURE DEFINED / NOT IMPLEMENTED / NOT DEPLOYED`  \nCreated: 2026-07-12  \nBase main: `34425d89fb205a43d8ce543862b2ab8371dabbb4`  \nRepository Alembic head: `0055`',
              'Status: `E1 IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED; E2 NOT IMPLEMENTED`  \nCreated: 2026-07-12  \nCurrent main: `2ad0ca47d994472201c218b3e6af37145cbacdec`  \nRepository Alembic head: `0057`',
              1,
          )
          old = '''### E1 — Structured Lab Drafts

Status: `PLANNED`.

- create a draft from finalized D2 transcription;
- select one or more reviewed OCR candidates as provenance;
- assign explicit source roles;
- preserve source wording exactly;
- optionally parse numeric/date fields without overwriting source text;
- allow owner/editor correction with optimistic concurrency;
- no confirmed observation yet.
'''
          new = '''### E1 — Source-preserving Lab Drafts

Status: `IMPLEMENTED / MERGED / CI VERIFIED / NOT DEPLOYED`.

Evidence:

```text
PR: #61
verified head: 419386e909207ab67921c008e210c059aba6658c
merge: 2ad0ca47d994472201c218b3e6af37145cbacdec
CI: #477
migrations: 0056–0057
```

Implemented:

- drafts from finalized D2 transcription;
- exact reviewed OCR candidate provenance with explicit source roles;
- source wording and optional parsed values stored separately;
- owner/editor mutation with optimistic concurrency;
- current document/OCR/patient/consent checks on every mutation;
- FORCE RLS, app-only restricted functions and content-free audit;
- no confirmed observation yet.
'''
          if old not in text:
              raise SystemExit('E1 contract marker not found')
          text = text.replace(old, new, 1)
          text = text.replace(
              'Status: `PLANNED AFTER E1 REVIEW`.',
              'Status: `NEXT / NOT IMPLEMENTED / NOT DEPLOYED`.',
              1,
          )
          contract.write_text(text, encoding='utf-8')

          register = Path('docs/source-index/SOURCE-REGISTER.md')
          text = register.read_text(encoding='utf-8')
          marker = '## Current factual sources'
          section = '''## HC-017 Slice E architecture and E1 evidence

| Source | Purpose |
|---|---|
| PR `#60`, merge `e60c2f9f96dc5c1e377466614aa8ef12be6199d8` | confirmed Labs architecture and security contract |
| `docs/implementation/HC-017-SLICE-E-CONFIRMED-LABS-CORE.md` | canonical E1/E2/E3 contract |
| `docs/reviews/HC-017-SLICE-E-ARCHITECTURE-REVIEW-2026-07-12.md` | independent architecture review |
| PR `#61` | E1 source-preserving Lab draft implementation |
| verified head `419386e909207ab67921c008e210c059aba6658c` | exact reviewed E1 code |
| merge `2ad0ca47d994472201c218b3e6af37145cbacdec` | E1 merged into `main` |
| migrations `0056–0057` | Lab drafts, provenance and context-hardening functions |
| CI `#477` | backend/frontend/full migration/E1-RLS verification |
| `docs/implementation/HC-017-SLICE-E1-LAB-DRAFTS-EVIDENCE-2026-07-12.md` | canonical E1 implementation evidence |

Key E1 sources:

- `backend/alembic/versions/0056_add_source_preserving_lab_drafts.py`;
- `backend/alembic/versions/0057_harden_lab_draft_context_mutations.py`;
- `backend/app/models/lab_observation.py`;
- `backend/app/schemas/lab_observation.py`;
- `backend/app/services/lab_observation.py`;
- `backend/app/api/routes/lab_observation.py`;
- `backend/tests/test_lab_observation_drafts_rls.py`;
- `backend/tests/test_lab_observation_draft_context_hardening.py`;
- `src/lib/labDraftApi.ts`;
- `src/pages/LabDrafts.tsx`.

E1 status:

```text
IMPLEMENTED
MERGED
CI VERIFIED
NOT DEPLOYED
NO CONFIRMED OBSERVATIONS
```

'''
          if marker not in text:
              raise SystemExit('source register marker not found')
          register.write_text(text.replace(marker, section + marker, 1), encoding='utf-8')

          Path('.github/workflows/e1-docs-sync.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CURRENT-STATE.md docs/PROJECT-PLAN.md \
            docs/implementation/HC-017-SLICE-E-CONFIRMED-LABS-CORE.md \
            docs/source-index/SOURCE-REGISTER.md .github/workflows/e1-docs-sync.yml
          git commit -m "docs: synchronize HC-017 E1 status"
          git push origin HEAD:docs/hc-017-e1-status
