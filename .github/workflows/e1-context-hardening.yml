name: Apply E1 context hardening wiring

on:
  push:
    branches: [feat/hc-017-lab-drafts]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/hc-017-lab-drafts
          fetch-depth: 0
      - name: Apply context wiring and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          migration = Path("backend/alembic/versions/0057_harden_lab_draft_context_mutations.py")
          text = migration.read_text(encoding="utf-8")
          old = '''def downgrade() -> None:\n    _drop_app_function(SET_SOURCES_SIG)\n    _drop_app_function(SET_STATUS_SIG)\n    raise RuntimeError(\n        "Downgrade from 0057 is intentionally blocked because restoring the shorter "\n        "mutation signatures would reintroduce stale-context and consent bypasses"\n    )\n'''
          new = '''def downgrade() -> None:\n    _drop_app_function(SET_SOURCES_SIG)\n    _drop_app_function(SET_STATUS_SIG)\n    op.execute(f"GRANT CREATE ON SCHEMA {S} TO {DEFINER}")\n    op.execute(\n        f"""\n        CREATE FUNCTION {S}.app_set_lab_draft_sources(\n          p_draft_id uuid,\n          p_expected_updated_at timestamptz,\n          p_sources jsonb,\n          p_audit_event_id uuid,\n          p_request_id text\n        ) RETURNS boolean\n        LANGUAGE plpgsql SECURITY DEFINER\n        SET search_path = '' SET row_security = off\n        AS $$\n        BEGIN\n          RAISE EXCEPTION 'Lab source mutation disabled after secure downgrade'\n            USING ERRCODE = 'HC409';\n        END;\n        $$\n        """\n    )\n    op.execute(\n        f"""\n        CREATE FUNCTION {S}.app_set_lab_observation_draft_status(\n          p_draft_id uuid,\n          p_status text,\n          p_expected_updated_at timestamptz,\n          p_audit_event_id uuid,\n          p_request_id text\n        ) RETURNS boolean\n        LANGUAGE plpgsql SECURITY DEFINER\n        SET search_path = '' SET row_security = off\n        AS $$\n        BEGIN\n          RAISE EXCEPTION 'Lab status mutation disabled after secure downgrade'\n            USING ERRCODE = 'HC409';\n        END;\n        $$\n        """\n    )\n    for signature in (OLD_SET_SOURCES_SIG, OLD_SET_STATUS_SIG):\n        op.execute(f"ALTER FUNCTION {signature} OWNER TO {DEFINER}")\n        op.execute(f"ALTER FUNCTION {signature} SET row_security = off")\n        op.execute(f"REVOKE ALL ON FUNCTION {signature} FROM PUBLIC")\n        op.execute(f"GRANT EXECUTE ON FUNCTION {signature} TO {APP}")\n    op.execute(f"REVOKE CREATE ON SCHEMA {S} FROM {DEFINER}")\n'''
          if old not in text:
              raise SystemExit("migration downgrade marker not found")
          migration.write_text(text.replace(old, new, 1), encoding="utf-8")

          page = Path("src/pages/LabDrafts.tsx")
          text = page.read_text(encoding="utf-8")
          text = text.replace(
              "return setLabDraftSources(profile.id, documentId, draft, [",
              "return setLabDraftSources(profile.id, documentId, context, draft, [",
              1,
          )
          text = text.replace(
              'setLabDraftStatus(profile!.id, documentId!, draft, "ready")',
              'setLabDraftStatus(profile!.id, documentId!, context!, draft, "ready")',
              1,
          )
          page.write_text(text, encoding="utf-8")

          test = Path("backend/tests/test_lab_observation_drafts_rls.py")
          text = test.read_text(encoding="utf-8")
          text = text.replace(
              "SELECT health_compass.app_set_lab_draft_sources(\n"
              "              %s,%s,%s::jsonb,%s,'lab-draft-test'\n"
              "            )",
              "SELECT health_compass.app_set_lab_draft_sources(\n"
              "              %s,%s,%s,%s,%s,%s::jsonb,%s,'lab-draft-test'\n"
              "            )",
              1,
          )
          text = text.replace(
              "(draft_id, initial_updated_at, json.dumps(manifest), uuid.uuid4()),",
              "(\n"
              "                draft_id,\n"
              "                initial_updated_at,\n"
              "                document_updated_at,\n"
              "                finalized_at,\n"
              "                decision_updated_at,\n"
              "                json.dumps(manifest),\n"
              "                uuid.uuid4(),\n"
              "            ),",
              1,
          )
          text = text.replace(
              "with psycopg.connect(_sync_url(APP_ENV)) as connection:\n"
              "        _set_user(connection, ids[\"editor\"])\n"
              "        assert connection.execute(\n"
              "            \"\"\"\n"
              "            SELECT health_compass.app_set_lab_observation_draft_status(\n"
              "              %s,'ready',%s,%s,'lab-draft-test'\n"
              "            )",
              "with psycopg.connect(_sync_url(APP_ENV)) as connection:\n"
              "        _set_user(connection, ids[\"editor\"])\n"
              "        document_updated_at, finalized_at, decision_updated_at = _context_versions(\n"
              "            connection, ids\n"
              "        )\n"
              "        assert connection.execute(\n"
              "            \"\"\"\n"
              "            SELECT health_compass.app_set_lab_observation_draft_status(\n"
              "              %s,'ready',%s,%s,%s,%s,%s,'lab-draft-test'\n"
              "            )",
              1,
          )
          text = text.replace(
              "(draft_id, after_sources, uuid.uuid4()),",
              "(\n"
              "                draft_id,\n"
              "                after_sources,\n"
              "                document_updated_at,\n"
              "                finalized_at,\n"
              "                decision_updated_at,\n"
              "                uuid.uuid4(),\n"
              "            ),",
              1,
          )
          text = text.replace(
              '"app_set_lab_draft_sources(uuid,timestamp with time zone,jsonb,uuid,text)",',
              '"app_set_lab_draft_sources(uuid,timestamp with time zone,"\n'
              '        "timestamp with time zone,timestamp with time zone,"\n'
              '        "timestamp with time zone,jsonb,uuid,text)",',
              1,
          )
          text = text.replace(
              '"app_set_lab_observation_draft_status(uuid,text,timestamp with time zone,uuid,text)",',
              '"app_set_lab_observation_draft_status(uuid,text,timestamp with time zone,"\n'
              '        "timestamp with time zone,timestamp with time zone,"\n'
              '        "timestamp with time zone,uuid,text)",',
              1,
          )
          test.write_text(text, encoding="utf-8")

          Path(".github/workflows/e1-context-hardening.yml").unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/alembic/versions/0057_harden_lab_draft_context_mutations.py \
            backend/tests/test_lab_observation_drafts_rls.py \
            src/pages/LabDrafts.tsx \
            .github/workflows/e1-context-hardening.yml
          git commit -m "fix: bind all Lab draft mutations to current source context"
          git push origin HEAD:feat/hc-017-lab-drafts
