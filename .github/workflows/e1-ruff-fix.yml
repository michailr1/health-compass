name: Apply E1 Ruff fix

on:
  push:
    branches: [feat/hc-017-lab-drafts]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/hc-017-lab-drafts
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply formatter and remove one-shot workflow
        run: |
          python -m pip install 'ruff>=0.6.0,<1.0.0'
          ruff check --fix backend/tests/test_lab_observation_drafts_rls.py
          rm .github/workflows/e1-ruff-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/tests/test_lab_observation_drafts_rls.py .github/workflows/e1-ruff-fix.yml
          git commit -m "style: format E1 PostgreSQL test imports"
          git push origin HEAD:feat/hc-017-lab-drafts
