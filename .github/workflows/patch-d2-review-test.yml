name: Patch D2 review test

on:
  push:
    branches: [feat/hc-017-ocr-human-review]
    paths:
      - .github/workflows/patch-d2-review-test.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/hc-017-ocr-human-review
          fetch-depth: 0
      - name: Apply exact test fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/tests/test_document_ocr_review_rls.py")
          text = path.read_text(encoding="utf-8")

          old_cleanup = '''        connection.execute(
              "DELETE FROM health_compass.document_ocr_patient_decisions WHERE profile_id = %s",
              (ids["profile"],),
          )'''
          new_cleanup = '''        connection.execute(
              "UPDATE health_compass.document_ocr_runs "
              "SET review_patient_decision_id = NULL "
              "WHERE profile_id = %s",
              (ids["profile"],),
          )
          connection.execute(
              "DELETE FROM health_compass.document_ocr_patient_decisions WHERE profile_id = %s",
              (ids["profile"],),
          )'''
          if text.count(old_cleanup) != 1:
              raise SystemExit("unexpected cleanup block")
          text = text.replace(old_cleanup, new_cleanup)

          if text.count("ORDER BY created_at, id") != 1:
              raise SystemExit("unexpected audit ordering marker")
          text = text.replace("ORDER BY created_at, id", "ORDER BY occurred_at, id")

          path.write_text(text, encoding="utf-8")
          PY
          git diff --check
          git diff -- backend/tests/test_document_ocr_review_rls.py
      - name: Commit test fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/tests/test_document_ocr_review_rls.py
          git commit -m "test: fix OCR review audit and cleanup assertions"
          git push origin HEAD:feat/hc-017-ocr-human-review
