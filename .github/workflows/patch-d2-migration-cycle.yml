name: Patch D2 migration cycle

on:
  push:
    branches: [feat/hc-017-ocr-human-review]
    paths:
      - .github/workflows/patch-d2-migration-cycle.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/hc-017-ocr-human-review
          fetch-depth: 0
      - name: Apply exact migration-cycle changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("backend/tests/test_migration_cycle.py")
          text = path.read_text(encoding="utf-8")

          old_functions = '''APP_DOCUMENT_FUNCTIONS = (
              "app_reserve_document_upload(uuid, bigint, bigint, bigint, integer, integer)",
              "app_can_review_document_ocr(uuid)",
          )'''
          new_functions = '''APP_DOCUMENT_FUNCTIONS = (
              "app_reserve_document_upload(uuid, bigint, bigint, bigint, integer, integer)",
              "app_can_review_document_ocr(uuid)",
              (
                  "app_review_document_ocr_candidate(uuid, text, text, text, "
                  "timestamp with time zone, uuid, text)"
              ),
              (
                  "app_set_document_ocr_patient_decision(uuid, uuid, text, text, "
                  "timestamp with time zone, timestamp with time zone, uuid, text)"
              ),
              (
                  "app_finalize_document_ocr_review(uuid, timestamp with time zone, jsonb, "
                  "timestamp with time zone, uuid, text)"
              ),
          )'''
          if text.count(old_functions) != 1:
              raise SystemExit("unexpected APP_DOCUMENT_FUNCTIONS block")
          text = text.replace(old_functions, new_functions)

          for old, new in (
              (
                  '    "document_ocr_candidates",\n)',
                  '    "document_ocr_candidates",\n    "document_ocr_patient_decisions",\n)',
              ),
          ):
              count = text.count(old)
              if count != 2:
                  raise SystemExit(f"expected two table tuple endings, found {count}")
              text = text.replace(old, new)

          path.write_text(text, encoding="utf-8")
          PY
          git diff --check
          git diff -- backend/tests/test_migration_cycle.py
      - name: Commit branch fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/tests/test_migration_cycle.py
          git commit -m "test: extend migration cycle for OCR review boundary"
          git push origin HEAD:feat/hc-017-ocr-human-review
